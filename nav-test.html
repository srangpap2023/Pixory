<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nav Test v3 · flex-column</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* ===== v2.8.0 · shell ใหม่ · flex column เต็มจอ (เหมือนแอปจริงที่รื้อใหม่) ===== */
  html, body { height: 100%; min-height: 0; overflow: hidden; background:#0A0A0E; color:#F2E0BA; font-family:-apple-system,'Inter',sans-serif; }
  .phone-wrap { height: 100dvh; max-height: 100dvh; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { flex-shrink: 0; padding: calc(env(safe-area-inset-top,0px) + 12px) 16px 12px; background:#0a0a0b; border-bottom:0.5px solid rgba(255,255,255,0.08); font-size:18px; font-weight:800; color:#E8B870; }
  .screen { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 16px; padding-bottom: 16px; }
  .card { background:#14110c; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:16px; margin-bottom:12px; font-size:14px; line-height:1.6; }

  /* แถบเมนู = ชิ้นล่างสุดในคอลัมน์ (static, in-flow) · พื้นทึบ · safe-area */
  .bottom-nav {
    flex-shrink: 0; align-self: stretch;
    display: flex; align-items: center; justify-content: space-around;
    background:#0A0A0E; border-top:0.5px solid rgba(255,255,255,0.10);
    padding-top: 5px; padding-bottom: 8px;
  }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:#A1A1AA; }
  .tab.active { color:#E8B870; }
  .tab .ic { font-size:22px; line-height:1; }
  .tab .lbl { font-size:10px; }
  .fab { flex:0 0 auto; width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#D4A056,#B8854A); color:#0A0A0E; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; }

  /* เส้นแดงขอบล่างจริง ไว้เทียบ */
  .baseline { position: fixed; bottom: 0; left: 0; right: 0; height: 6px; background:#ff3b30; z-index: 9; }
</style>
</head>
<body>
<div class="phone-wrap">
  <div class="topbar">🧪 ทดสอบ v3 · shell ใหม่ flex-column</div>
  <div class="screen">
    <div class="card"><b>เลื่อนลงล่างสุด</b> → แถบเมนูควร<b>ทับเส้นแดง</b>ขอบล่างพอดี = ชิด ✅</div>
    <div class="card"><b>สำคัญ:</b> เปิดมาเลย <b>ไม่ต้องหมุนจอ</b> ดูว่าชิดทันที + <b>ไม่มีแถบสีโผล่ใต้เมนู</b></div>
    <div class="card">เติมความสูง 1</div>
    <div class="card">เติมความสูง 2</div>
    <div class="card">เติมความสูง 3</div>
    <div class="card">เติมความสูง 4</div>
    <div class="card">เติมความสูง 5 · เลื่อนลงสุด</div>
  </div>
  <div class="bottom-nav">
    <div class="tab active"><div class="ic">🏠</div><div class="lbl">หน้าหลัก</div></div>
    <div class="tab"><div class="ic">📋</div><div class="lbl">งาน</div></div>
    <div class="fab">+</div>
    <div class="tab"><div class="ic">📅</div><div class="lbl">ปฏิทิน</div></div>
    <div class="tab"><div class="ic">📊</div><div class="lbl">สรุป</div></div>
  </div>
</div>
<div class="baseline"></div>
</body>
</html>
